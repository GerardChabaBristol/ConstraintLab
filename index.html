<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstraintLab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App heading for the prototype interface -->
  <header class="app-header">
    <h1>ConstraintLab</h1>
  </header>

  <main class="app-main">
    <section class="sequencer-section" aria-label="Sequencer grid area">
      <!-- Main interaction area: transport bar plus grid/constraints row -->
      <div class="main-content">
        <!-- Connected transport strip (play, BPM display, clear pattern) -->
        <div class="control-bar">
          <div class="control-segment control-play">
            <button
              id="playbackToggleButton"
              class="playback-toggle-button is-play"
              type="button"
              aria-label="Start playback"
            >
              <span class="icon icon-play" aria-hidden="true"></span>
              <span class="icon icon-pause" aria-hidden="true"></span>
            </button>
          </div>

          <div class="control-segment control-bpm">
            <div class="bpm-display" aria-label="Tempo control">
              <span class="bpm-text">BPM:</span>
              <input
                id="bpmInput"
                class="bpm-input"
                type="number"
                min="40"
                max="240"
                step="1"
                value="90"
                aria-label="BPM value"
              />
              <button
                id="metronomeToggleButton"
                class="metronome-toggle-button has-tooltip"
                type="button"
                aria-label="Enable metronome"
                aria-pressed="false"
                data-tooltip="Metronome"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9.4 4.5h5.2l3.6 13.8H5.8z"></path>
                  <path d="M12 8.4v6.7"></path>
                  <path d="M10.1 11.7l3.8-1.8"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="control-segment control-try">
            <div class="try-inline" aria-label="Suggestion">
              <span class="try-inline-label">Try this:</span>
              <span id="try-this-text" class="try-inline-text"></span>
            </div>
          </div>

          <div class="control-segment control-clear">
            <button id="clearPatternButton" class="clear-button" type="button" aria-label="Clear pattern">
              <span class="clear-icon" aria-hidden="true">X</span>
              <span class="clear-text">CLEAR</span>
            </button>
          </div>
        </div>

        <!-- Core workspace: sequencer canvas (left) and constraint controls (right) -->
        <div class="content-row">
          <div id="sequencerGrid" class="sequencer-grid" role="region" aria-live="polite">
            <div id="stepSequencer" class="step-sequencer" aria-label="Step sequencer"></div>
          </div>
        </div>
      </div>

      <aside id="constraintsPanel" class="constraints-panel constraints-panel-bottom" aria-label="Constraints controls">
        <h2 class="constraints-title">Constraints</h2>

        <div class="constraints-faders">
          <div class="constraint-control">
            <label
              for="constraintSlider1"
              class="constraint-label constraint-label--help"
              data-tooltip="Controls how many steps the loop plays before repeating."
            >Loop Length</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span title="Full 32-step loop">32</span>
                <span title="Repeats after step 16">16</span>
                <span title="Repeats after step 8">8</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider1"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="3"
                  step="1"
                  value="1"
                />
              </div>
            </div>
            <span id="constraintValue1" class="constraint-value constraint-level-value">Loop: 8</span>
          </div>

          <div class="constraint-control">
            <label
              for="constraintSlider2"
              class="constraint-label constraint-label--help"
              data-tooltip="Controls how many step positions are available for note placement."
            >Grid Resolution</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span title="All step positions are available.">Fine</span>
                <span title="Every 2nd step position is available.">Medium</span>
                <span title="Every 4th step position is available.">Coarse</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider2"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="3"
                  step="1"
                  value="3"
                />
              </div>
            </div>
            <span id="constraintValue2" class="constraint-value constraint-level-value">Grid: Fine</span>
          </div>

          <div class="constraint-control">
            <label
              for="constraintSlider3"
              class="constraint-label constraint-label--help"
              data-tooltip="Controls how many total hits you can place in the pattern (across all instruments). The number of max hits is relative to the selected Loop Length."
            >Density</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span class="constraint-scale-value" data-density-level="free">Free</span>
                <span class="constraint-scale-value" data-density-level="dense">Dense</span>
                <span class="constraint-scale-value" data-density-level="moderate">Moderate</span>
                <span class="constraint-scale-value" data-density-level="sparse">Sparse</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider3"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="4"
                  step="1"
                  value="4"
                />
              </div>
            </div>
            <span id="constraintValue3" class="constraint-value constraint-level-value">Density: Free</span>
          </div>

          <div class="constraint-control">
            <label
              for="constraintSlider4"
              class="constraint-label constraint-label--help"
              data-tooltip="Limits how many instruments can be used in the pattern."
            >Kit Size</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span title="All instruments available.">5</span>
                <span title="First 4 instruments are available.">4</span>
                <span title="Only the first 3 instruments are available.">3</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider4"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="3"
                  step="1"
                  value="1"
                />
              </div>
            </div>
            <span id="constraintValue4" class="constraint-value constraint-level-value">Kit: 3</span>
          </div>

          <div class="constraint-control">
            <label for="constraintSlider5" class="constraint-label">Guidance</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider5"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="5"
                  step="1"
                  value="3"
                />
              </div>
            </div>
            <span id="constraintValue5" class="constraint-value constraint-level-value">Level: 3</span>
          </div>

          <div class="constraint-control">
            <label for="constraintSlider6" class="constraint-label">Repetition</label>
            <div class="constraint-fader-row">
              <div class="constraint-scale" aria-hidden="true">
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
              </div>
              <div class="constraint-fader">
                <input
                  id="constraintSlider6"
                  class="constraint-slider"
                  type="range"
                  min="1"
                  max="5"
                  step="1"
                  value="3"
                />
              </div>
            </div>
            <span id="constraintValue6" class="constraint-value constraint-level-value">Level: 3</span>
          </div>
        </div>

        <div class="lock-control">
          <label class="lock-label" for="lock-sliders">
            <input id="lock-sliders" class="lock-checkbox" type="checkbox" />
            <span>Lock sliders</span>
          </label>
          <button id="resetConstraintsButton" class="constraints-reset-button" type="button">
            Reset Defaults
          </button>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
